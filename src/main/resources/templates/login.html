<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" th:href="@{/css/styles.css}">
</head>
<body>
<header class="site-header">
    <div class="container header-inner">
        <h1><a th:href="@{/}">TravelApp</a></h1>
        <nav>
            <a th:href="@{/}">Home</a>
            <a th:href="@{/login}">Login</a>
            <a th:href="@{/register}">Register</a>
        </nav>
    </div>
</header>

<main class="container">
    <div class="auth-container">
        <h2>User Login</h2>

        <div th:if="${error}" class="error" th:text="${error}"></div>
        <div th:if="${success}" class="success" th:text="${success}"></div>

        <form method="post" th:action="@{/login}">
            <div class="form-group">
                <label for="email">Email</label>
                <input type="email" id="email" name="email" required placeholder="your@email.com"/>
            </div>
            <div class="form-group">
                <label for="password">Password</label>
                <input type="password" id="password" name="password" required placeholder="Your password"/>
            </div>
            <button type="submit" class="btn-login">Login</button>
        </form>

        <div class="auth-link" style="margin-top: 25px; margin-bottom: -10px;">
            <a th:href="@{/forgot-password}">Forgot password?</a>
        </div>

        <div class="auth-link">
            Don't have an account? <a th:href="@{/register}">Register here</a>
        </div>

    </div>
</main>

<footer class="site-footer">
    <div class="container">
        <p>© 2026 TravelApp. All Rights Reserved.</p>
    </div>
</footer>
<div id="chatbot-widget" class="chatbot-widget" aria-live="polite">
    <button type="button" class="chatbot-launcher" aria-label="Open chatbot">Need help?</button>
    <div class="chatbot-panel" role="dialog" aria-modal="true" aria-label="Travel assistant chat">
        <div class="chatbot-header">
            <div>
                <strong>TravelApp Assistant</strong>
                <p>Ask about booking, packages, destinations, and support.</p>
            </div>
            <button type="button" class="chatbot-close" aria-label="Close chat">×</button>
        </div>
        <div class="chatbot-messages" aria-label="Chat messages"></div>
        <div class="chatbot-options-note">Choose one of the help options below.</div>
        <div class="chatbot-quick-links">
            <button type="button" class="chatbot-quick-link">How to book</button>
            <button type="button" class="chatbot-quick-link">View packages</button>
            <button type="button" class="chatbot-quick-link">Show travel places</button>
            <button type="button" class="chatbot-quick-link">See package prices</button>
            <button type="button" class="chatbot-quick-link">How to register</button>
            <button type="button" class="chatbot-quick-link">Contact us</button>
        </div>
    </div>
</div>
<script src="/js/chatbot.js"></script>
</body>
</html>
